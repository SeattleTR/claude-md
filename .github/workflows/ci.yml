name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: |
          shellcheck \
            .claude/hooks/*.sh \
            skills/*.sh \
            .githooks/pre-commit \
            install.sh

  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats jq
      - name: Run bats suite
        run: bats tests/

  install-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dry-run installer
        run: |
          mkdir /tmp/target && cd /tmp/target && git init -q
          bash "$GITHUB_WORKSPACE/install.sh" --dry-run .
      - name: Real install
        run: |
          mkdir /tmp/real && cd /tmp/real && git init -q
          bash "$GITHUB_WORKSPACE/install.sh" --no-githooks .
          # Core artifacts must exist
          test -f AGENT.md
          test -f CLAUDE.md
          test -f AGENTS.md
          test -f .cursorrules
          test -f .windsurfrules
          test -f CONVENTIONS.md
          test -f .aider.conf.yml
          test -f .claude/settings.json
          test -f .claude/hooks/_lib.sh
          test -f .githooks/pre-commit
          test -f memory/progress.md
          # githooks must NOT be auto-activated
          [ "$(git config --get core.hooksPath || true)" = "" ]
